services:
  nifi:
    image: apache/nifi:1.28.0
    container_name: nifi
    ports:
      - "8443:8443"
    environment:
      - SINGLE_USER_CREDENTIALS_USERNAME=admin
      - SINGLE_USER_CREDENTIALS_PASSWORD=qwertyuiopo1
      - NIFI_WEB_PROXY_HOST=localhost:8443,127.0.0.1:8443,nifi:8443,nifi
    volumes:
      - ./nifi/dati_csv:/opt/workspace/input_data
      - ./hdfs/config:/opt/hadoop/etc/hadoop:ro
    networks:
      - hdfs_network
    restart: always
    depends_on:
      - namenode
      - datanode

  namenode:
    image: apache/hadoop:3.4.1
    container_name: namenode
    hostname: namenode
    user: root
    environment:
      - HADOOP_HOME=/opt/hadoop
      - HADOOP_CONF_DIR=/opt/hadoop/etc/hadoop
    volumes:
      - ./hdfs/namenode:/opt/hadoop/data/nameNode
      - ./hdfs/config:/opt/hadoop/etc/hadoop
      - ./hdfs/start-hdfs.sh:/start-hdfs.sh
      - ./hdfs/config/log4j.properties:/opt/hadoop/etc/hadoop/log4j.properties
    ports:
      - "9870:9870"
      - "9000:9000" # Porta RPC per la comunicazione dati
    command: [ "/bin/bash", "/start-hdfs.sh" ]
    restart: always
    networks:
      - hdfs_network

  datanode:
    image: apache/hadoop:3.4.1
    container_name: datanode
    hostname: datanode
    user: root
    environment:
      - HADOOP_HOME=/opt/hadoop
      - HADOOP_CONF_DIR=/opt/hadoop/etc/hadoop
    volumes:
      - ./hdfs/datanode:/opt/hadoop/data/dataNode # Corretto percorso locale per coerenza
      - ./hdfs/config:/opt/hadoop/etc/hadoop      # Usiamo la stessa cartella config del namenode
      - ./hdfs/init-datanode.sh:/init-datanode.sh
      - ./hdfs/config/log4j.properties:/opt/hadoop/etc/hadoop/log4j.properties
    depends_on:
      - namenode
    command: [ "/bin/bash", "/init-datanode.sh" ]
    restart: always
    networks:
      - hdfs_network

  postgres:
    image: postgres:13
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow
    networks:
      - hdfs_network

  airflow-webserver:
      build: .
      container_name: airflow-webserver
      depends_on:
        airflow-init:
          condition: service_completed_successfully
      user: "1000:0"
      environment:
        - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
        - AIRFLOW__CORE__EXECUTOR=LocalExecutor
        - AIRFLOW__CORE__LOAD_EXAMPLES=False
        - AIRFLOW_UID=1000
        - AIRFLOW_CONN_NIFI_DEFAULT=https://admin:qwertyuiopo1@nifi:8443?verify=false
        - AIRFLOW_CONN_HDFS_DEFAULT=webhdfs://namenode:9870
        - AIRFLOW_CONN_SPARK_DEFAULT=spark://spark%3A%2F%2Fspark-master:7077
        - HADOOP_USER_NAME=root
      volumes:
        - ./airflow/dags:/opt/airflow/dags
        - ./airflow/logs:/opt/airflow/logs
        - ./spark/spark_scripts:/opt/spark/scripts
      ports:
        - "8081:8080"
      command: webserver
      networks:
        - hdfs_network

  airflow-scheduler:
      build: .
      container_name: airflow-scheduler
      depends_on:
        airflow-init:
          condition: service_completed_successfully
      user: "1000:0"
      environment:
        - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
        - AIRFLOW__CORE__EXECUTOR=LocalExecutor
        - AIRFLOW_UID=1000
        - AIRFLOW_CONN_NIFI_DEFAULT=https://admin:qwertyuiopo1@nifi:8443?verify=false
        - AIRFLOW_CONN_HDFS_DEFAULT=webhdfs://namenode:9870
        - AIRFLOW_CONN_SPARK_DEFAULT=spark://spark%3A%2F%2Fspark-master:7077
        - HADOOP_USER_NAME=root
      volumes:
        - ./airflow/dags:/opt/airflow/dags
        - ./airflow/logs:/opt/airflow/logs
        - ./spark/spark_scripts:/opt/spark/scripts
      command: scheduler
      networks:
        - hdfs_network

    #Serve per inizializzare il database
  airflow-init:
      build: .
      user: "1000:0"
      environment:
        - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
        - _AIRFLOW_DB_UPGRADE=true
        - _AIRFLOW_WWW_USER_CREATE=true
        - _AIRFLOW_WWW_USER_USERNAME=admin
        - _AIRFLOW_WWW_USER_PASSWORD=admin
        - AIRFLOW_UID=1000
        - AIRFLOW_CONN_NIFI_DEFAULT=https://admin:qwertyuiopo1@nifi:8443?verify=false
        - AIRFLOW_CONN_HDFS_DEFAULT=webhdfs://namenode:9870
        - AIRFLOW_CONN_SPARK_DEFAULT=spark://spark-master:7077
      command: db migrate
      depends_on:
        - postgres
      networks:
        - hdfs_network


  spark-master:
    image: apache/spark:3.5.1
    container_name: spark-master
    user: root
    command: /opt/spark/sbin/start-master.sh
    environment:
      - SPARK_MASTER_HOST=spark-master
      - SPARK_MASTER_PORT=7077
      - SPARK_NO_DAEMONIZE=true
      - HADOOP_CONF_DIR=/opt/spark/conf/hadoop-conf
      - HADOOP_USER_NAME=root
    ports:
      - "8080:8080"
      - "7077:7077"
    volumes:
      - ./hdfs/config:/opt/spark/conf/hadoop-conf:ro
      - ./spark/spark_scripts:/opt/spark/scripts
    networks:
      - hdfs_network

  spark-worker:
      image: apache/spark:3.5.1
      container_name: spark-worker
      user: root
      command: /opt/spark/sbin/start-worker.sh spark://spark-master:7077
      environment:
        - SPARK_WORKER_CORES=2
        - SPARK_WORKER_MEMORY=1g
        - SPARK_NO_DAEMONIZE=true
        - HADOOP_CONF_DIR=/opt/spark/conf/hadoop-conf
        - HADOOP_USER_NAME=root
      depends_on:
        - spark-master
      volumes:
        - ./hdfs/config:/opt/spark/conf/hadoop-conf:ro
        - ./spark/spark_scripts:/opt/spark/scripts
      networks:
        - hdfs_network

networks:
  hdfs_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24
